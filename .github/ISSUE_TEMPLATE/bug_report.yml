name: Bug Report
description: Report a bug with the Atlassian provider
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Create resource with configuration...
        2. Run `tofu apply`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages and logs if available.
    validations:
      required: true

  - type: input
    id: provider-version
    attributes:
      label: Provider Version
      description: Version of terraform-provider-atlassian.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: tofu-version
    attributes:
      label: OpenTofu / Terraform Version
      description: Output of `tofu version` or `terraform version`.
      placeholder: "OpenTofu 1.9.0"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant Configuration
      description: Provider and resource configuration (redact sensitive values).
      render: hcl

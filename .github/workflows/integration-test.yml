name: Integration Tests

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: integration-tests
  cancel-in-progress: false

jobs:
  integration:
    name: Integration (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: integration
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Jira Core
            package: ./internal/jira/...
            pattern: "^TestIntegration(Group|IssueType[^S]|CustomField|Screen[^S])"
          - name: Jira Schemes
            package: ./internal/jira/...
            pattern: "^TestIntegration(ScreenScheme|IssueTypeScheme|IssueTypeScreenScheme|PermissionScheme|Status)"
          - name: Jira Projects
            package: ./internal/jira/...
            pattern: "^TestIntegration(Project|DataSource|_preflight)"
          - name: Jira Workflows
            package: ./internal/jira/...
            pattern: "^TestIntegrationWorkflow"
          - name: Confluence
            package: ./internal/confluence/...
            pattern: "^TestIntegration"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ATLASSIAN_URL: op://terraform-provider-atlassian/atlassian-api-token/url
          ATLASSIAN_USER: op://terraform-provider-atlassian/atlassian-api-token/email
          ATLASSIAN_TOKEN: op://terraform-provider-atlassian/atlassian-api-token/api-token

      - name: Run integration tests
        env:
          TF_ACC: "1"
        run: go test ${{ matrix.package }} -v -count=1 -timeout 20m -run '${{ matrix.pattern }}'

  # Run sweepers only after ALL integration jobs complete to avoid deleting
  # resources that parallel matrix jobs are still using.
  cleanup:
    name: Sweep stale resources
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: integration
    needs: [integration]
    if: always()
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ATLASSIAN_URL: op://terraform-provider-atlassian/atlassian-api-token/url
          ATLASSIAN_USER: op://terraform-provider-atlassian/atlassian-api-token/email
          ATLASSIAN_TOKEN: op://terraform-provider-atlassian/atlassian-api-token/api-token

      - name: Sweep Jira resources
        run: go test ./internal/jira/... -v -sweep=all -timeout 10m

      - name: Sweep Confluence resources
        run: go test ./internal/confluence/... -v -sweep=all -timeout 10m

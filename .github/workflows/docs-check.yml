name: Docs Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Verify Generated Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install tfplugindocs
        run: go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.24.0

      - name: Generate docs
        run: tfplugindocs generate

      - name: Check for diff
        run: |
          if ! git diff --exit-code docs/; then
            echo "::error::Generated docs are out of date. Run 'tfplugindocs generate' and commit the changes."
            git diff docs/
            exit 1
          fi
